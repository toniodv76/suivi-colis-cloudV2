services:
  - type: web
    name: suivi-colis
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ACCESS_CODE
        value: h2otech
      - key: EMAIL_TO
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: suivi-colis-db
          property: connectionString

databases:
  - name: suivi-colis-db
    plan: free
