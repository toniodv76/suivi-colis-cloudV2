<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Historique</title><link rel="stylesheet" href="/static/style.css"></head><body class="admin"><main><h1>Historique complet</h1><div class="actions"><a href="/?code={{ code }}">Retour</a><a href="/export/monthly?code={{ code }}">Export mois</a></div><section class="list">{% for c in colis %}<article class="row {{ 'done' if c.statut == 'FAIT' else 'todo' }}"><div><strong>{{ c.client }}</strong><p>{{ c.adresse }}</p><p>{{ c.contenu }}</p><small>Créé : {{ c.created_at }}{% if c.done_at %} / Fait : {{ c.done_at }}{% endif %}</small></div><div class="status">{{ c.statut }}</div></article>{% endfor %}</section></main></body></html>
