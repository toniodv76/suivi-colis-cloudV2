<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Suivi colis</title><link rel="stylesheet" href="/static/style.css"></head><body class="admin"><main><h1>📦 Suivi colis</h1><form class="form" method="post" action="/?code={{ code }}"><input name="client" placeholder="Client" required><input name="adresse" placeholder="Adresse" required><textarea name="contenu" placeholder="Colis / références / contenu à envoyer" required></textarea><button>Ajouter l'envoi</button></form><div class="actions"><a href="/historique?code={{ code }}">Historique</a><a href="/export/monthly?code={{ code }}">Export mois</a><a href="/send_report?code={{ code }}">Envoyer le rapport maintenant</a><a href="/ecran" target="_blank">Écran magasin</a></div><section class="list">{% for c in colis %}<article class="row {{ 'done' if c.statut == 'FAIT' else 'todo' }}"><div><strong>{{ c.client }}</strong><p>{{ c.adresse }}</p><p>{{ c.contenu }}</p><small>{{ c.created_at }}</small></div><div class="status">{{ c.statut }}</div><div class="buttons"><a href="/statut/{{c.id}}/FAIT?code={{ code }}">FAIT</a><a href="/statut/{{c.id}}/A%20FAIRE?code={{ code }}">À FAIRE</a><a class="danger" href="/delete/{{c.id}}?code={{ code }}" onclick="return confirm('Supprimer ?')">SUPPR.</a></div></article>{% endfor %}</section></main></body></html>
